<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Produtos - Fruits</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="container flex-nav">
            <h1 id="logo">Fruits</h1>
            <nav aria-label="Navegação principal">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="produtos.html" class="active">Produtos</a></li>
                    <li><a href="contato.html">Contato</a></li>
                    <li><a href="login.html" class="btn-login">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container fade-in page-content">
        <section>
            <h2>Catálogo Digital</h2>
            <p>Escolha entre "Retirada no Local" ou "Entrega em Domicílio" ao finalizar seu pedido.</p>
            <div class="catalog-grid">
                <article class="product-card">
                    <figure>
                        <img src="https://images.unsplash.com/photo-1571771894821-ce9b6c11b08e?auto=format&fit=crop&w=400&q=80" alt="Cacho de bananas amarelas">
                        <figcaption>Banana Prata - R$ 5,00/kg</figcaption>
                    </figure>
                    <button class="btn-primary">Adicionar ao Carrinho</button>
                </article>
                <article class="product-card">
                    <figure>
                        <img src="https://images.unsplash.com/photo-1518977676601-b53f82aba655?auto=format&fit=crop&w=400&q=80" alt="Batatas inglesas frescas">
                        <figcaption>Batata Inglesa - R$ 6,50/kg</figcaption>
                    </figure>
                    <button class="btn-primary">Adicionar ao Carrinho</button>
                </article>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Sistema Fruits - Quixeramobim, CE.</p>
        </div>
    </footer>
