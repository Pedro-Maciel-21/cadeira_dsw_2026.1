<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Produtos - Fruits</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- CABEÇALHO ORGÂNICO -->
    <header class="main-header">
        <div class="container flex-nav">
            <h1 id="logo">Fruits</h1>

            <nav aria-label="Navegação principal">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="produtos.html" class="active">Produtos</a></li>
                    <li><a href="contato.html">Contato</a></li>
                    <li><a href="login.html" class="btn-login">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="container fade-in page-content">

        <section>
            <h2>Catálogo Natural</h2>
            <p style="margin-top: 10px;">
                Aqui você encontra frutas, legumes e verduras fresquinhos, selecionados diariamente.
                Escolha seus produtos preferidos e receba tudo com qualidade direto da natureza.
            </p>

            <!-- GRID ORGÂNICO DE PRODUTOS -->
            <div class="catalog-grid">

                <!-- PRODUTO 1 -->
                <article class="product-card">
                    <figure>
                        <img src="https://images.unsplash.com/photo-1571771894821-ce9b6c11b08e?auto=format&fit=crop&w=900&q=80"
                             alt="Cacho de bananas frescas">
                        <figcaption>Banana Prata – R$ 5,00/kg</figcaption>
                    </figure>
                    <button class="btn-primary">Adicionar ao Carrinho</button>
                </article>

                <!-- PRODUTO 2 -->
                <article class="product-card">
                    <figure>
                        <img src="https://images.unsplash.com/photo-1518977676601-b53f82aba655?auto=format&fit=crop&w=900&q=80"
                             alt="Batatas inglesas frescas">
                        <figcaption>Batata Inglesa – R$ 6,50/kg</figcaption>
                    </figure>
                    <button class="btn-primary">Adicionar ao Carrinho</button>
                </article>

                <!-- PRODUTO 3 -->
                <article class="product-card">
                    <figure>
                        <img src="https://images.unsplash.com/photo-1601004890684-d8cbf643f5f2?auto=format&fit=crop&w=900&q=80"

                        <figcaption>Tomate – R$ 7,00/kg</figcaption>
                    </figure>
                    <button class="btn-primary">Adicionar ao Carrinho</button>
                </article>

                <!-- PRODUTO 4 -->
                <article class="product-card">
                    <figure>
                        <img src="https://images.unsplash.com/photo-1574226516831-e1dff420e43e?auto=format&fit=crop&w=900&q=80"
                             alt="Cenouras frescas recém colhidas">
                        <figcaption>Cenoura – R$ 4,50/kg</figcaption>
                    </figure>
                    <button class="btn-primary">Adicionar ao Carrinho</button>
                </article>

                <!-- PRODUTO 5 -->
                <article class="product-card">
                    <figure>
                        <img src="https://images.unsplash.com/photo-1579684453423-4f7a5b0ca2cf?auto=format&fit=crop&w=900&q=80"
                             alt="Maçãs vermelhas e naturais">
                        <figcaption>Maçã Nacional – R$ 9,00/kg</figcaption>
                    </figure>
                    <button class="btn-primary">Adicionar ao Carrinho</button>

                <!-- PRODUTO 6 -->
                <article class="product-card">
                    <figure>
                        <img src="https://images.unsplash.com/photo-1582515073490-39981397c445?auto=format&fit=crop&w=900&q=80"
                             alt="Folhas de alface orgânica">
                        <figcaption>Alface Crespa – R$ 3,00/unidade</figcaption>
                    </figure>
                    <button class="btn-primary">Adicionar ao Carrinho</button>
                </article>

    <footer>
