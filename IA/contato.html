<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Fruits</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- CABEÇALHO ORGÂNICO -->
    <header class="main-header">
        <div class="container flex-nav">
            <h1 id="logo">Fruits</h1>

            <nav aria-label="Navegação principal">
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="produtos.html">Produtos</a></li>
                    <li><a href="contato.html" class="active">Contato</a></li>
                    <li><a href="login.html" class="btn-login">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- CONTEÚDO PRINCIPAL -->
    <main class="container fade-in page-content">

        <section class="form-section">
            <h2>Fale Conosco</h2>
            <p style="margin-top: 8px;">
                Estamos aqui para ajudar! Caso tenha dúvidas sobre entregas, produtos, pagamentos ou queira apenas mandar um feedback,
                nossa equipe terá prazer em responder.
            </p>

            <figure class="contact-figure" style="margin-top: 25px;">
                <img src="https://images.unsplash.com/photo-1596524430615-b46475ddff6e?auto=format&fit=crop&w=1200&q=80"
                     alt="Mesa com caderno, telefone e elementos naturais">
                <figcaption>Envie sua mensagem — responderemos o mais rápido possível!</figcaption>
            </figure>

            <form action="#" method="POST" class="contact-form" style="margin-top: 20px;">
                <div class="input-group">
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
                </div>

                <div class="input-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
                </div>

                <div class="input-group">
                    <label for="mensagem">Mensagem:</label>
                    <textarea id="mensagem" name="mensagem" rows="5" placeholder="Como podemos ajudar?" required></textarea>
                </div>

                <button type="submit" class="btn-primary">Enviar Mensagem</button>
            </form>
        </section>

    </main>

    <!-- RODAPÉ ORGÂNICO -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Fruits - Hortifrúti Natural em Quixeramobim.</p>
        </div>
    </footer>

</body>
</html>
